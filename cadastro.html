<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro| Flex </title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
</head>

<body class="login-page">
    <div class="login-container signup-container">
        <div class="login-box">
            <div class="login-logo">
                <span>⚖️</span><strong> Flex</strong>
            
            </div>
            <h2>Crie sua Conta Gratis</h2>
            <p>Modernize seu escritorio em menos de 2 minutos. </p>

            <form id="cadastroForm">
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Dr.Carlos Silva"required>

                </div>

                <div class="input-grid" >
                    <div class="input-group">
                        
                        <label for="email">E-mail Proficional</label>
                        <input type="email" id="email" placeholder="contato@escritorio.com"required>
                    
                    </div>

                    <div class=" input-group">
                       
                        <label for="oab">Número da OAB </label>
                        <input type="text" id="oab" placeholder="123456/SP"required>
                    
                    </div>
                </div>

                <div class="input-grid">
                        
                        <div class="input-group">
                        <label for="senha"> Crie sua Senha</label>
                        <input type="password" id="senha" placeholder="••••••••"required >
                     
                    </div>
                </div>

                <button type="submit" class="btn-login" style="margin-top: 10px;">CRIAR CONTA</button>
            
            </form>
            <p class="signup-link">Já possui conta?<a href="login.html"> Faça Login aqui</a></p>
        </div>
    </div>
    
</body>
</html>
