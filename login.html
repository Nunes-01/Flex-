<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login| FLEX </title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body  class="login-page">

    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">

                <span>⚖️</span><strong>Flex</strong>
            </div>

            <h2> Bem-vindo de volta </h2>
            <p>Acesse sua conta para gerenciar seus Processos. </p>

            <form id="loginForm">

                <div class=" input-group">

                    <label for="email">E-mail Proficional </label>
                    <input type="email" id="email"placeholder ="exemplo@gmail.com" required>
                
                </div>

                <div class="input-group">

                    <label for="passoword">Senha</label>
                    <input type="password" id="passsword" placeholder="••••••••"required>
                
                </div>

                <div class="login-options">
                    <label><input type="checkbox"> Salvar</label>
                    <a href="#">Esqueceu a senha?</a>

                </div>

                <button type="submit" class="btn-login"> ENTRAR</button>
            </form>
             <p class="signup-link">Não possui conta?<a href="cadastro.html"> Faça cadastro aqui</a></p>
        </div>
        </div>
    </div>
    
</body>
</html>
